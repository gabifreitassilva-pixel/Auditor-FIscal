<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Simuladores PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #f97316; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #ea580c; }
        body { background-color: #0a0a0a; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        .glass-panel { background: #111; border: 1px solid #222; border-radius: 12px; }
        .calc-card { transition: all 0.2s ease; border: 1px solid #222; background: #0f0f0f; position: relative; overflow: hidden; }
        .calc-card:hover { border-color: #f97316; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(249, 115, 22, 0.1); }
        
        /* Modal Animation */
        .modal-enter { animation: modalFadeIn 0.3s ease-out forwards; }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Iframe styling */
        .sim-iframe { width: 100%; height: 80vh; border: none; background: transparent; }
    </style>
</head>
<body class="flex h-screen w-full">

    <aside class="w-72 bg-black border-r border-neutral-800 flex flex-col h-full z-20 flex-shrink-0">
        <div class="p-6 border-b border-neutral-800">
            <h1 class="text-2xl font-bold text-white flex items-center gap-2">
                <i data-lucide="calculator" class="text-orange-500"></i>
                <span class="text-orange-500">Simulador</span><span class="text-white text-lg">PRO</span>
            </h1>
            <p class="text-xs text-neutral-400 mt-2 tracking-widest uppercase font-bold">GFS Intelligence</p>
        </div>

        <div class="p-4">
            <div class="relative">
                <i data-lucide="search" class="absolute left-3 top-3 text-neutral-500 w-4 h-4"></i>
                <input type="text" id="searchInput" onkeyup="filtrarCalculadoras()" placeholder="Buscar simulador..." class="w-full bg-[#111] border border-neutral-700 text-white rounded-lg py-2 pl-9 pr-3 text-sm focus:border-orange-500 outline-none transition-colors">
            </div>
        </div>

        <nav class="flex-1 overflow-y-auto px-3 space-y-1 pb-6">
            <div class="pt-2 pb-2 px-3 text-[10px] font-bold text-neutral-500 uppercase tracking-wider">Departamentos</div>
            
            <button onclick="selecionarCategoria('todas', this)" class="cat-btn active w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium bg-orange-600 text-white transition-colors">
                <i data-lucide="layout-grid" class="w-4 h-4"></i> Todos
            </button>
            <button onclick="selecionarCategoria('fiscal', this)" class="cat-btn w-full flex items-center justify-between px-3 py-2.5 rounded-lg text-sm font-medium text-neutral-400 hover:bg-neutral-900 transition-colors">
                <div class="flex items-center gap-3"><i data-lucide="file-text" class="w-4 h-4"></i> Depto. Fiscal</div>
            </button>
            <button onclick="selecionarCategoria('dp', this)" class="cat-btn w-full flex items-center justify-between px-3 py-2.5 rounded-lg text-sm font-medium text-neutral-400 hover:bg-neutral-900 transition-colors">
                <div class="flex items-center gap-3"><i data-lucide="users" class="w-4 h-4"></i> Depto. Pessoal</div>
            </button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-full bg-[#0a0a0a] relative">
        <header class="h-20 border-b border-neutral-900 flex items-center px-10 bg-black/50 backdrop-blur-md shrink-0">
            <div>
                <h2 class="text-xl font-bold text-white uppercase tracking-widest" id="header-title">Todos os Simuladores</h2>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8" id="calculators-grid">
            </div>
    </main>

    <div id="simulador-modal" class="fixed inset-0 bg-black/95 z-50 hidden flex-col">
        <div class="h-16 border-b border-neutral-800 flex items-center justify-between px-6 bg-black">
            <div class="flex items-center gap-3">
                <div class="bg-orange-500/20 p-2 rounded"><i data-lucide="zap" class="text-orange-500 w-5 h-5"></i></div>
                <h2 class="text-white font-bold text-lg" id="sim-title">Nome do Simulador</h2>
            </div>
            <button onclick="fecharSimulador()" class="text-neutral-500 hover:text-white transition-colors flex items-center gap-2 text-sm bg-neutral-900 px-4 py-2 rounded-lg border border-neutral-800">
                <i data-lucide="x" class="w-4 h-4"></i> Fechar Ferramenta
            </button>
        </div>

        <div class="flex-1 overflow-y-auto p-4 md:p-8 flex justify-center items-start modal-enter">
            <div id="modal-container" class="w-full max-w-6xl glass-panel overflow-hidden shadow-2xl bg-[#0c0c0c]">
                <div id="simulador-content" class="w-full"></div>
            </div>
        </div>
    </div>

    <script>
        const dbSimuladores = [
            { cat: 'fiscal', nome: 'Difal Compra', icon: 'truck', file: 'Difal Compra.html' },
            { cat: 'dp', nome: 'Aprendiz - Quantidade Obrigatória', icon: 'users', file: null },
            { cat: 'fiscal', nome: 'Diferencial de Alíquotas (Geral)', icon: 'arrow-left-right', file: null }
        ];

        let categoriaAtiva = 'todas';

        function init() {
            lucide.createIcons();
            renderizarCards();
        }

        function renderizarCards(search = '') {
            const container = document.getElementById('calculators-grid');
            container.innerHTML = '';
            
            let filtrados = dbSimuladores;
            if (categoriaAtiva !== 'todas') filtrados = filtrados.filter(i => i.cat === categoriaAtiva);
            if (search) filtrados = filtrados.filter(i => i.nome.toLowerCase().includes(search.toLowerCase()));

            const grid = document.createElement('div');
            grid.className = 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4';

            filtrados.forEach(sim => {
                grid.insertAdjacentHTML('beforeend', `
                    <div onclick="abrirSimulador('${sim.nome}', '${sim.file}')" class="calc-card rounded-xl p-6 cursor-pointer group">
                        <i data-lucide="${sim.icon}" class="w-6 h-6 mb-4 text-neutral-500 group-hover:text-orange-500 transition-colors"></i>
                        <h3 class="text-white font-bold text-sm">${sim.nome}</h3>
                        <div class="mt-4 flex items-center text-[10px] uppercase font-bold text-neutral-600 tracking-wider">
                            ${sim.cat} <i data-lucide="chevron-right" class="w-3 h-3 ml-auto opacity-0 group-hover:opacity-100 transition-all text-orange-500"></i>
                        </div>
                    </div>
                `);
            });
            container.appendChild(grid);
            lucide.createIcons();
        }

        function abrirSimulador(nome, arquivo) {
            document.getElementById('sim-title').innerText = nome;
            const content = document.getElementById('simulador-content');
            
            if (arquivo && arquivo !== 'null') {
                // SE TIVER ARQUIVO EXTERNO (Ex: Difal Compra.html)
                content.innerHTML = `<iframe src="${arquivo}" class="sim-iframe"></iframe>`;
            } else {
                // SE NÃO TIVER ARQUIVO AINDA
                content.innerHTML = `
                    <div class="p-20 text-center">
                        <i data-lucide="construction" class="w-12 h-12 mx-auto mb-4 text-orange-500/50"></i>
                        <p class="text-neutral-500">Este simulador está sendo integrado.</p>
                    </div>
                `;
            }

            document.getElementById('simulador-modal').classList.remove('hidden');
            document.getElementById('simulador-modal').classList.add('flex');
            lucide.createIcons();
        }

        function fecharSimulador() {
            document.getElementById('simulador-modal').classList.add('hidden');
            document.getElementById('simulador-content').innerHTML = ''; // Limpa o iframe ao fechar
        }

        function selecionarCategoria(cat, btn) {
            categoriaAtiva = cat;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('bg-orange-600', 'text-white'));
            btn.classList.add('bg-orange-600', 'text-white');
            renderizarCards();
        }

        function filtrarCalculadoras() {
            renderizarCards(document.getElementById('searchInput').value);
        }

        window.onload = init;
    </script>
</body>
</html>
