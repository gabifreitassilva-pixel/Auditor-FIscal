<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MasterTax - Raio-X Tributário</title>
    <script src="db_cnaes.js"></script> 
    
    <style>
        :root { --bg-main: #0a0a0a; --bg-card: #1e1e1e; --primary: #ff8c00; --text-light: #f0f0f0; --border-color: #333; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-light); padding: 30px; }
        
        .header-title { color: var(--text-light); border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; display: inline-block; }
        .search-container { background-color: var(--bg-card); padding: 20px; border-radius: 8px; border: 1px solid var(--border-color); display: flex; gap: 15px; align-items: flex-end; margin-bottom: 25px; }
        .input-group { display: flex; flex-direction: column; flex: 1; }
        .input-group label { color: var(--primary); font-size: 12px; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        .input-group input { padding: 12px; background-color: #000; border: 1px solid var(--border-color); color: #fff; border-radius: 5px; font-size: 16px; outline: none; }
        .btn-search { background-color: var(--primary); color: #000; padding: 12px 25px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        .cnae-item { background: #141414; padding: 15px; border: 1px solid #2a2a2a; margin-bottom: 12px; border-radius: 6px; }
        .enquadramento-box { background-color: #111; border-left: 3px solid var(--primary); padding: 12px; margin-top: 10px; display: grid; grid-template-columns: 80px 1fr; gap: 15px; align-items: center; }
        .cod-servico { font-size: 20px; font-weight: bold; color: #00d4ff; text-align: center; }
        .cod-servico span { display: block; font-size: 9px; color: #888; }
        .desc-lc { font-size: 11px; color: var(--primary); font-style: italic; border-bottom: 1px solid #333; padding-bottom: 4px; margin-bottom: 4px; }
        .regra-texto { font-size: 12px; color: #bbb; }
    </style>
</head>
<body>

    <h2 class="header-title">Onboarding: Raio-X Tributário</h2>
    <p style="color: #a0a0a0; margin-bottom: 20px;">O sistema cruza automaticamente o CNPJ com nosso banco de dados isolado (db_cnaes.js).</p>
    
    <div class="search-container">
        <div class="input-group">
            <label>CNPJ da Empresa</label>
            <input type="text" id="cnpj-input" placeholder="00.000.000/0000-00" maxlength="18" oninput="maskCNPJ(this)" onkeypress="if(event.key === 'Enter') buscarCNPJ()">
        </div>
        <button class="btn-search" onclick="buscarCNPJ()">🔎 Analisar Empresa</button>
    </div>
    
    <div id="loading-msg" style="display: none; color: var(--primary);">⏳ Consultando e cruzando dados...</div>
    
    <div id="resultado" style="display: none; background: var(--bg-card); padding: 20px; border-radius: 8px;">
        <h3 style="color: var(--primary); margin-bottom: 15px;">Razão Social: <span id="res-nome" style="color: #fff;"></span></h3>
        <div id="res-cnaes"></div>
    </div>

    <script>
        function maskCNPJ(input) {
            let v = input.value.replace(/\D/g, "");
            v = v.replace(/^(\d{2})(\d)/, "$1.$2"); v = v.replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3");
            v = v.replace(/\.(\d{3})(\d)/, ".$1/$2"); v = v.replace(/(\d{4})(\d)/, "$1-$2");
            input.value = v;
        }

        async function buscarCNPJ() {
            const input = document.getElementById('cnpj-input').value;
            const cnpjLimpo = input.replace(/\D/g, "");
            if(cnpjLimpo.length !== 14) { alert("CNPJ inválido."); return; }

            document.getElementById('loading-msg').style.display = 'block';
            document.getElementById('resultado').style.display = 'none';

            try {
                const response = await fetch(`https://brasilapi.com.br/api/cnpj/v1/${cnpjLimpo}`);
                if(!response.ok) throw new Error("CNPJ não encontrado na base.");
                const data = await response.json();
                
                document.getElementById('res-nome').innerText = data.razao_social;
                const listaCnaes = document.getElementById('res-cnaes');
                listaCnaes.innerHTML = '';

                let todosCnaes = [];
                if(data.cnae_fiscal) todosCnaes.push({ cod: data.cnae_fiscal, desc: data.cnae_fiscal_descricao, tipo: 'PRINCIPAL' });
                if(data.cnaes_secundarios) data.cnaes_secundarios.forEach(c => todosCnaes.push({ cod: c.codigo, desc: c.descricao, tipo: 'SECUNDÁRIO' }));

                todosCnaes.forEach(cnae => {
                    const codStr = String(cnae.cod);
                    // AQUI ELE LÊ DO ARQUIVO SEPARADO (db_cnaes.js)
                    const enquadramento = dbEnquadramento[codStr]; 
                    
                    let boxHtml = '';
                    if(enquadramento) {
                        boxHtml = `
                            <div class="enquadramento-box">
                                <div class="cod-servico">${enquadramento.servico}<span>Cód. Fed</span></div>
                                <div>
                                    <div class="desc-lc">"${enquadramento.desc_lc}"</div>
                                    <div class="regra-texto"><strong>Anexos:</strong> ${enquadramento.anexos.join(', ')} | <strong>Regra:</strong> ${enquadramento.regra}</div>
                                </div>
                            </div>`;
                    } else {
                        boxHtml = `<div class="enquadramento-box" style="border-left-color: #555;">
                                    <div class="cod-servico">?</div>
                                    <div class="regra-texto">CNAE ainda não cadastrado no banco de dados (db_cnaes.js).</div>
                                   </div>`;
                    }

                    listaCnaes.innerHTML += `
                        <div class="cnae-item">
                            <strong style="color: var(--primary); font-size: 11px;">${cnae.tipo}</strong><br>
                            <strong>${codStr}</strong> - <span style="color: #ccc;">${cnae.desc}</span>
                            ${boxHtml}
                        </div>`;
                });
                
                document.getElementById('loading-msg').style.display = 'none';
                document.getElementById('resultado').style.display = 'block';

            } catch (error) {
                alert("Erro: " + error.message);
                document.getElementById('loading-msg').style.display = 'none';
            }
        }
    </script>
</body>
</html>
