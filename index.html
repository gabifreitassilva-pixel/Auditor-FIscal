<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GFS Intelligence - Consultoria Tributária</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { margin: 0; padding: 0; background-color: #0a0a0a; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #333; border-radius: 10px; }
        .custom-scrollbar:hover::-webkit-scrollbar-thumb { background-color: #ff7300; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Calendário Premium */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .calendar-day { aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; border-radius: 50%; transition: all 0.2s; cursor: pointer; }
        .day-header { color: #666; font-weight: bold; text-transform: uppercase; font-size: 0.65rem; padding-bottom: 8px; text-align: center; }
        .day-active { background: #ff7300; color: #000; font-weight: 900; box-shadow: 0 0 12px rgba(255, 115, 0, 0.5); }
        .day-today { border: 1px solid #ff7300; color: #ff7300; }
        .day-empty { opacity: 0.1; cursor: default; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { createRoot } = ReactDOM;

        // SISTEMA DE ÍCONES COMPLETO
        const Icon = ({ name, color = "currentColor", size = 18, className = "" }) => {
          const icons = {
            Search: <><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></>,
            BarChart: <><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></>,
            Scale: <><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/></>,
            DollarSign: <><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></>,
            TrendingUp: <><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><path d="M17 6h6v6"/></>,
            Calendar: <><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></>,
            ShieldCheck: <><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></>,
            FileText: <><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></>,
            Clock: <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
            Globe: <><circle cx="12" cy="12" r="10"/><line x1="2" x2="22" y1="12" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 0 20 15.3 15.3 0 0 1 0-20"/></>,
            Settings: <><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></>,
            Building: <><rect width="16" height="20" x="4" y="2" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M8 10h.01"/><path d="M16 10h.01"/><path d="M8 14h.01"/><path d="M16 14h.01"/></>,
            Users: <><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
            Calculator: <><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></>,
            Gem: <><path d="M6 3h12l4 6-10 13L2 9Z"/><path d="M11 3 8 9l4 13"/><path d="M13 3l3 6-4 13"/></>,
            Zap: <><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></>,
            Newspaper: <><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16l-2-2-2 2v-4"/><path d="M14 8h.01"/><path d="M14 12h.01"/><path d="M14 16h.01"/><path d="M10 8h.01"/><path d="M10 12h.01"/><path d="M10 16h.01"/></>,
            Barcode: <><path d="M3 5v14"/><path d="M8 5v14"/><path d="M12 5v14"/><path d="M17 5v14"/><path d="M21 5v14"/></>,
            ScrollText: <><path d="M8 21h12a2 2 0 0 0 2-2v-2H10v2a2 2 0 1 1-4 0V5a2 2 0 1 0-4 0v3h4"/><path d="M19 17V5a2 2 0 0 0-2-2H4"/></>,
            Database: <><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></>,
            UserCheck: <><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/></>,
            FileBadge: <><path d="M4 7V4a2 2 0 0 1 2-2h8.5L20 7.5V20a2 2 0 0 1-2 2h-6"/><path d="M9 12a3 3 0 1 0 0 6 3 3 0 0 0 0-6Z"/><path d="M11 14.5 12 18l-2-1-2 1 1-3.5"/></>,
            Library: <><path d="m16 6 4 14"/><path d="M12 6v14"/><path d="M8 8v12"/><path d="M4 4v16"/></>,
            BadgeDollarSign: <><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="M12 7v10"/><path d="M9 14h6"/><path d="M9 10h6"/></>,
            ClipboardCheck: <><rect width="8" height="4" x="8" y="2" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="m9 14 2 2 4-4"/></>,
            ChevronLeft: <><polyline points="15 18 9 12 15 6"/></>,
            ChevronRight: <><polyline points="9 18 15 12 9 6"/></>
          };
          return (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
              {icons[name] || <><circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/></>}
            </svg>
          );
        };

        // CARREGADOR DE MÓDULOS (IFRAME AUTOMÁTICO)
        const ModuleLoader = ({ filename }) => (
            <div className="w-full h-full animate-fade-in bg-[#050505]">
                <iframe 
                    src={filename} 
                    className="w-full h-[calc(100vh-80px)] border-none"
                    title="Módulo"
                />
            </div>
        );

        // DASHBOARD (COM TODAS AS 9 NOTÍCIAS)
        const DashboardView = () => {
            const [searchNews, setSearchNews] = useState('');
            const allNews = [
                { title: "RFB: Publicado novo regulamento do Imposto de Renda 2024", desc: "Instrução Normativa RFB nº 2178 consolida regras para o exercício atual.", date: "Hoje", url: "https://www.gov.br/receitafederal/pt-br/assuntos/noticias" },
                { title: "IOB: Mudanças no ICMS-ST para o setor automotivo e eletrônicos", desc: "Convênio ICMS sofre alterações nas alíquotas internas e protocolos interestaduais.", date: "Ontem", url: "https://noticias.iob.com.br/" },
                { title: "CRC-SP: Abertas inscrições para Exame de Suficiência 2024.1", desc: "Conselho abre período de inscrições para bacharéis de todo o estado.", date: "Hoje", url: "https://online.crcsp.org.br/portal/noticias/noticias.asp" },
                { title: "Econet: Alerta sobre o vencimento da DEFIS e do DASN-SIMEI", desc: "Prazo final para entrega das obrigações acessórias do Simples Nacional se aproxima.", date: "2 dias atrás", url: "https://www.econeteditora.com.br/links_pagina_inicial/noticias20.php" },
                { title: "Contábeis: Reforma Tributária - O que muda no Simples em 2025", desc: "Análise técnica sobre a transição para o IBS e CBS nas micro e pequenas empresas.", date: "Hoje", url: "https://www.contabeis.com.br/conteudo/noticias/" },
                { title: "SEFAZ SP: Novos campos obrigatórios na NF-e para ICMS-ST", desc: "Nota Fiscal eletrônica ganha validações de preenchimento para base de cálculo retida.", date: "3 dias atrás", url: "https://portal.fazenda.sp.gov.br/Noticias" },
                { title: "Cenofisco: Manual de Retenção de Serviços Tomados atualizado", desc: "Guia prático sobre ISS, PCC e IRRF de acordo com a nova IN 2110.", date: "4 dias atrás", url: "https://www.cenofisco.com.br/" },
                { title: "Domínio: Webinar gratuito sobre FGTS Digital e eSocial", desc: "Sistemas Domínio realizam treinamento sobre a nova forma de recolhimento do FGTS.", date: "5 dias atrás", url: "https://www.dominiosistemas.com.br/blog/" },
                { title: "Jornal Contábil: Passo a passo para a Declaração do IRPF", desc: "Tudo o que você precisa saber para não cair na malha fina este ano.", date: "1 semana atrás", url: "https://jornalcontabil.ig.com.br/" }
            ];

            const handleNewsSearch = (e) => {
                e.preventDefault();
                const domains = ["gov.br/receitafederal", "iob.com.br", "econeteditora.com.br", "crcsp.org.br", "contabeis.com.br", "fazenda.sp.gov.br", "cenofisco.com.br", "dominiosistemas.com.br", "jornalcontabil.ig.com.br"];
                const siteFilter = domains.map(d => `site:${d}`).join(' OR ');
                window.open(`https://www.google.com.br/search?q=(${siteFilter}) ${encodeURIComponent(searchNews)}`, '_blank');
            };

            const obligationsMap = { 7: "FGTS Digital", 10: "IPI (Decendial)", 15: "EFD-Reinf / eSocial", 20: "PGDAS-D / DCTFWeb", 25: "IPI (Mensal)", 31: "IRPJ/CSLL" };
            const [currentDate, setCurrentDate] = useState(new Date());
            const nextMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1));
            const prevMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1));
            const startDay = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1).getDay();
            const totalDays = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).getDate();
            const monthNames = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];

            const calendarCells = [];
            for (let i = 0; i < startDay; i++) calendarCells.push(<div key={`empty-${i}`} className="calendar-day day-empty"></div>);
            for (let d = 1; d <= totalDays; d++) {
                const isTask = obligationsMap[d];
                const isToday = d === new Date().getDate() && currentDate.getMonth() === new Date().getMonth();
                calendarCells.push(<div key={d} className={`calendar-day ${isTask ? 'day-active' : ''} ${isToday ? 'day-today' : ''}`}>{d}</div>);
            }

            return (
                <div className="p-8 max-w-7xl mx-auto w-full animate-fade-in grid grid-cols-1 lg:grid-cols-4 gap-8 overflow-y-auto h-[calc(100vh-80px)] custom-scrollbar">
                    <div className="lg:col-span-3">
                        <div className="flex flex-col md:flex-row justify-between items-end border-b-2 border-orange-500 pb-2 mb-8 gap-4">
                            <h2 className="text-2xl font-bold text-white uppercase tracking-widest flex items-center gap-3 shrink-0"><Icon name="Newspaper" size={24}/> Radar Tributário</h2>
                            <form onSubmit={handleNewsSearch} className="relative w-full max-w-md">
                                <input type="text" value={searchNews} onChange={(e) => setSearchNews(e.target.value)} placeholder="Pesquisar nos portais oficiais..." className="w-full bg-[#111] border border-gray-800 p-2 pl-10 rounded-xl text-xs text-white focus:border-orange-500 outline-none" />
                                <Icon name="Search" size={14} className="absolute left-3 top-2.5 text-gray-500" />
                            </form>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {allNews.map((n, i) => (
                                <div key={i} className="p-5 rounded-2xl bg-[#111] border border-gray-800 hover:border-orange-500 transition-all cursor-pointer group flex flex-col justify-between shadow-xl" onClick={() => window.open(n.url, '_blank')}>
                                    <div><span className="text-[9px] text-gray-500 font-mono bg-black/50 px-2 py-0.5 rounded">{n.date}</span><h4 className="text-sm font-bold text-white group-hover:text-orange-400 mt-2 mb-3 leading-snug">{n.title}</h4><p className="text-[11px] text-gray-400 line-clamp-3 mb-4">{n.desc}</p></div>
                                    <span className="text-orange-500 text-[10px] font-black uppercase flex items-center gap-1">Ler matéria completa <Icon name="ChevronRight" size={12}/></span>
                                </div>
                            ))}
                        </div>
                    </div>
                    <div className="lg:col-span-1">
                        <h2 className="text-2xl font-bold text-white uppercase tracking-widest flex items-center gap-3 border-b-2 border-cyan-500 pb-2 mb-8"><Icon name="Calendar" size={24}/> Agenda</h2>
                        <div className="bg-[#111] border border-gray-800 rounded-[2rem] p-6 shadow-2xl mb-6">
                            <div className="flex justify-between items-center mb-6">
                                <button onClick={prevMonth} className="hover:text-orange-500"><Icon name="ChevronLeft"/></button>
                                <span className="text-sm font-black uppercase tracking-tighter text-white">{monthNames[currentDate.getMonth()]} {currentDate.getFullYear()}</span>
                                <button onClick={nextMonth} className="hover:text-orange-500"><Icon name="ChevronRight"/></button>
                            </div>
                            <div className="calendar-grid">{['D','S','T','Q','Q','S','S'].map(h => <div key={h} className="day-header">{h}</div>)}{calendarCells}</div>
                        </div>
                        <div className="space-y-3 bg-black/40 p-4 rounded-2xl border border-gray-900">
                            {Object.entries(obligationsMap).map(([day, task]) => (
                                <div key={day} className="flex items-center gap-3 border-b border-gray-800 pb-2 last:border-0"><div className="w-8 h-8 rounded-full bg-orange-600/10 border border-orange-500/30 flex items-center justify-center text-[10px] font-black text-orange-500">{day.padStart(2, '0')}</div><p className="text-[10px] font-bold text-gray-300 uppercase leading-tight">{task}</p></div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // APP PRINCIPAL (MENU COMPLETO)
        function App() {
          const [activeId, setActiveId] = useState('dashboard');
          const [isUnlocked, setIsUnlocked] = useState(false);
          const [pwdInput, setPwdInput] = useState('');

          const menu = [
            { name: 'Geral', items: [
                { id: 'dashboard', name: 'Dashboard (Radar)', icon: 'Newspaper' },
                { id: 'raiox', name: 'Raio-X Tributário', icon: 'Search' },
                { id: 'simuladores', name: 'Central de Simuladores', icon: 'Zap' },
              ]},
            { name: 'Inteligência', items: [
                { id: 'projecao', name: 'Projeção Tributária', icon: 'TrendingUp' },
                { id: 'ncm', name: 'Consulta NCM/CEST', icon: 'Barcode' },
                { id: 'config_notas', name: 'Configurador de Notas', icon: 'ScrollText' },
                { id: 'cnae_codserv', name: 'Cnae x Cod Serv', icon: 'Database' },
                { id: 'codigos_servico', name: 'Códigos de Serviço', icon: 'FileText' },
                { id: 'retencao_pers', name: 'Retenção Personalizada', icon: 'UserCheck' },
              ]},
            { name: 'Departamentos', items: [
                { id: 'dep_contabil', name: 'Contábil', icon: 'Calculator' },
                { id: 'dep_dp', name: 'Dep. Pessoal (DP)', icon: 'Users' },
                { id: 'dep_fiscal', name: 'Fiscal', icon: 'FileText' },
                { id: 'dep_obrigacoes', name: 'Obrigações Acessórias', icon: 'Calendar' },
                { id: 'dep_societario', name: 'Societário', icon: 'Building' },
                { id: 'dep_exportacao', name: 'Exportação', icon: 'Globe' },
              ]},
            { name: 'Serviços Premium', items: [
                { id: 'cnds', name: 'Central de Certidões (CND)', icon: 'FileBadge' },
                { id: 'parcelamentos', name: 'Parcelamentos', icon: 'ScrollText' },
                { id: 'planejamento', name: 'Planejamento Tributário', icon: 'Scale' },
                { id: 'dep_restituicao', name: 'Recuperação Tributária', icon: 'Gem' },
                { id: 'dep_bpo', name: 'BPO Financeiro', icon: 'DollarSign' },
              ]},
            { name: 'Apoio Operacional', items: [
                { id: 'biblioteca', name: 'Modelos e Downloads', icon: 'Library' },
                { id: 'honorarios', name: 'Calculadora de Honorários', icon: 'BadgeDollarSign' },
                { id: 'check_diag', name: 'Checklist de Diagnóstico', icon: 'ClipboardCheck' },
              ]},
            { name: 'Admin', adminOnly: true, items: [
                { id: 'lote', name: 'Configurações DB', icon: 'Settings' },
              ]},
          ];

          return (
            <div className="flex h-screen bg-[#0a0a0a] overflow-hidden">
              <aside className="w-72 bg-black border-r border-gray-800 flex flex-col h-full relative z-20">
                <div className="h-20 flex items-center px-8 border-b border-gray-900 shrink-0">
                  <Icon name="Globe" className="text-orange-500 mr-3" size={24} />
                  <span className="text-white font-extrabold tracking-[3px] text-lg uppercase">GFS<span className="text-orange-500"> Intelligence</span></span>
                </div>
                <div className="flex-1 overflow-y-auto custom-scrollbar p-6 space-y-6">
                  {menu.map(cat => (!cat.adminOnly || isUnlocked) && (
                    <div key={cat.name}>
                      <span className="uppercase text-[10px] font-black text-gray-600 tracking-[2px] mb-3 block">{cat.name}</span>
                      <ul className="space-y-1">
                        {cat.items.map(i => (
                          <li key={i.id} onClick={() => setActiveId(i.id)} className={`flex items-center px-4 py-3 cursor-pointer rounded-xl transition-all border-l-2 ${activeId === i.id ? 'bg-[#1a1a1a] border-orange-500 text-white shadow-lg' : 'border-transparent text-gray-500 hover:bg-white/5 hover:text-gray-300'}`}>
                            <Icon name={i.icon} size={16} className={`mr-3 ${activeId === i.id ? 'text-orange-500' : 'text-gray-700'}`} />
                            <span className="text-[12px] font-bold tracking-tight">{i.name}</span>
                          </li>
                        ))}
                      </ul>
                    </div>
                  ))}
                </div>
                <div className="p-6 bg-black border-t border-gray-900">
                   {!isUnlocked ? (
                     <div className="flex flex-col gap-3">
                        <input type="password" value={pwdInput} onChange={e=>setPwdInput(e.target.value)} placeholder="Acesso Admin" className="bg-gray-900 border border-gray-800 text-xs p-3 rounded-lg text-white outline-none focus:border-orange-500" />
                        <button onClick={() => pwdInput === '12345' ? setIsUnlocked(true) : alert('Acesso Negado')} className="w-full py-3 bg-gray-800 text-gray-400 rounded-lg text-[10px] font-black uppercase hover:bg-orange-600 hover:text-white">Desbloquear Admin</button>
                     </div>
                   ) : (
                     <button onClick={() => setIsUnlocked(false)} className="w-full py-3 rounded-lg text-[10px] font-black uppercase bg-gray-800 text-red-500 border border-red-500/20">Bloquear</button>
                   )}
                </div>
              </aside>

              <main className="flex-1 flex flex-col bg-[#050505] relative overflow-hidden shadow-inner">
                <header className="h-20 border-b border-gray-900 flex items-center justify-between px-10 shrink-0 bg-black/50 backdrop-blur-md z-10">
                  <span className="text-[10px] font-black text-orange-500/50 uppercase tracking-[4px]">Desenvolvido por Gabriela Freitas</span>
                  <div className="flex items-center gap-4 group cursor-pointer">
                    <span className="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Consultor PRO</span>
                    <div className="w-10 h-10 rounded-full bg-gradient-to-tr from-gray-800 to-gray-700 flex items-center justify-center text-[10px] text-orange-500 border border-gray-600 shadow-lg">GF</div>
                  </div>
                </header>

                <div className="flex-1 overflow-hidden">
                  {/* CONDIÇÕES DE EXIBIÇÃO AUTOMÁTICA */}
                  {activeId === 'dashboard' && <DashboardView />}
                  
                  {/* GERAL E INTELIGÊNCIA */}
                  {activeId === 'raiox' && <ModuleLoader filename="Raio X Tributario.html" />}
                  {activeId === 'simuladores' && <ModuleLoader filename="Central de Simuladores.html" />}
